<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BDAi Login</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--acc:#c96e3f;--acc2:#e8956a;--bg:#faf8f6;--txt:#1a1410;--mut:#8a7a6e;--bdr:#e0d9d3;--font:'Noto Sans Bengali',sans-serif}
body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.logo{width:80px;height:80px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 6px 20px rgba(201,110,63,.35))}
.title{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;color:var(--txt);margin-bottom:4px}
.title span{color:var(--acc);font-style:italic}
.sub{font-size:13px;color:var(--mut);text-align:center;line-height:1.7;margin-bottom:32px}
.flag{font-size:20px;margin-bottom:6px}
.card{background:#fff;border:1px solid var(--bdr);border-radius:20px;padding:24px;width:100%;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.google-btn{width:100%;padding:13px;background:#fff;border:1.5px solid var(--bdr);border-radius:12px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-family:var(--font);font-size:13.5px;font-weight:600;color:#333;box-shadow:0 2px 8px rgba(0,0,0,.08);transition:all .2s;margin-bottom:12px}
.google-btn:active{transform:scale(.98);background:#f9f9f9}
.or-row{display:flex;align-items:center;gap:10px;margin:12px 0}
.or-line{flex:1;height:1px;background:var(--bdr)}
.or-txt{font-size:12px;color:var(--mut)}
.email-btn{width:100%;padding:13px;background:var(--acc);border:none;border-radius:12px;font-family:var(--font);font-size:13.5px;font-weight:700;color:#fff;cursor:pointer;transition:all .2s;margin-bottom:12px}
.email-btn:active{background:#b5612f}
.note{font-size:10.5px;color:var(--mut);text-align:center;line-height:1.6}

/* Email Login Form */
.form-section{display:none;margin-top:12px}
.form-section.show{display:block}
.finp{width:100%;border:1.5px solid var(--bdr);border-radius:10px;padding:11px 14px;font-family:var(--font);font-size:13px;color:var(--txt);outline:none;margin-bottom:10px;transition:border-color .2s}
.finp:focus{border-color:var(--acc)}
.back-btn{background:none;border:none;color:var(--mut);font-family:var(--font);font-size:12px;cursor:pointer;margin-bottom:10px}

/* Loading */
.loading{display:none;position:fixed;inset:0;background:rgba(250,248,246,.9);align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:999}
.loading.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid #e0d9d3;border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--mut)}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loadingTxt">লগইন হচ্ছে...</div>
</div>

<div style="text-align:center;margin-bottom:20px">
  <div class="flag">🇧🇩</div>
  <img src="bdai_logo.png" class="logo" onerror="this.outerHTML='<div style=font-size:60px;margin-bottom:12px>🌟</div>'">
  <div class="title">BDAi <span>By Azad</span></div>
  <div class="sub">বাংলাদেশের প্রথম নিজস্ব<br>মাল্টি-ফাংশনাল AI প্ল্যাটফর্ম</div>
</div>

<div class="card">
  <button class="google-btn" onclick="googleLogin()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Google দিয়ে Login করুন
  </button>

  <div class="or-row"><div class="or-line"></div><div class="or-txt">অথবা</div><div class="or-line"></div></div>

  <button class="email-btn" onclick="showEmailForm()">📧 Email দিয়ে Login</button>

  <div class="form-section" id="emailForm">
    <button class="back-btn" onclick="hideEmailForm()">← ফিরে যান</button>
    <input class="finp" type="email" id="emailInp" placeholder="আপনার Email">
    <input class="finp" type="password" id="passInp" placeholder="Password" onkeydown="if(event.key==='Enter')emailLogin()">
    <button class="email-btn" onclick="emailLogin()">✅ Login করুন</button>
    <button class="email-btn" style="background:transparent;color:var(--acc);border:1.5px solid var(--acc)" onclick="emailRegister()">নতুন Account তৈরি করুন</button>
  </div>

  <div class="note">Login করলে আমাদের শর্তাবলী মেনে নিচ্ছেন।<br>আপনার data সম্পূর্ণ সুরক্ষিত থাকবে।</div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX",
  authDomain: "bdai-by-azad.firebaseapp.com",
  projectId: "bdai-by-azad",
  storageBucket: "bdai-by-azad.appspot.com",
  messagingSenderId: "930945592495",
  appId: "1:930945592495:android:557ae4f3e73aaf2052f85a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showLoad(txt='লগইন হচ্ছে...') {
  document.getElementById('loadingTxt').textContent = txt;
  document.getElementById('loading').classList.add('show');
}
function hideLoad() {
  document.getElementById('loading').classList.remove('show');
}

async function saveUser(user) {
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      uid: user.uid,
      name: user.displayName || 'BDAi User',
      email: user.email,
      plan: 'free',
      premium_expiry: null,
      created_at: serverTimestamp(),
      daily_usage: { chat: 0, image: 0, code: 0, video: 0, date: new Date().toDateString() }
    });
  }
  window.location.href = 'index.html';
}

window.googleLogin = async function() {
  try {
    showLoad('Google দিয়ে লগইন হচ্ছে...');
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    await saveUser(result.user);
  } catch(e) {
    hideLoad();
    alert('❌ Login failed: ' + e.message);
  }
};

window.emailLogin = async function() {
  const email = document.getElementById('emailInp').value.trim();
  const pass = document.getElementById('passInp').value;
  if (!email || !pass) { alert('Email ও Password দিন'); return; }
  try {
    showLoad();
    const result = await signInWithEmailAndPassword(auth, email, pass);
    await saveUser(result.user);
  } catch(e) {
    hideLoad();
    alert('❌ ' + e.message);
  }
};

window.emailRegister = async function() {
  const email = document.getElementById('emailInp').value.trim();
  const pass = document.getElementById('passInp').value;
  if (!email || !pass) { alert('Email ও Password দিন'); return; }
  if (pass.length < 6) { alert('Password কমপক্ষে ৬ অক্ষর হতে হবে'); return; }
  try {
    showLoad('Account তৈরি হচ্ছে...');
    const result = await createUserWithEmailAndPassword(auth, email, pass);
    await saveUser(result.user);
  } catch(e) {
    hideLoad();
    alert('❌ ' + e.message);
  }
};

window.showEmailForm = function() {
  document.getElementById('emailForm').classList.add('show');
};
window.hideEmailForm = function() {
  document.getElementById('emailForm').classList.remove('show');
};
</script>
</body>
</html>
